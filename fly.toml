# Replace "exam-system" with your chosen app name (must be globally unique on fly.io)
app = "aljamia-admission-exam"
primary_region = "sin"  # Singapore — closest to your Neon ap-southeast-1 DB

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 400
    hard_limit = 600

[[vm]]
  size = "performance-2x"   # 2 vCPUs, 4 GB RAM — enough headroom for 1000 concurrent students
